# Grok Build project configuration
#
# Grok is a secondary runtime in this repo. Its prompts should mirror the same
# operating law and direct-execution flow used in Codex sessions.

[subagents]
enabled = true
default_model = "grok-4.3"
max_parallel = 2

[skills]
paths = [".grok/skills", "~/.grok/skills"]

[reasoning]
default_effort = "medium"
high_effort_tasks = [
  "architecture",
  "risk",
  "refactor",
  "multi-file",
  "payback",
  "capital",
  "gateway",
  "signer",
  "kill-switch"
]

[model_routing]
planning_and_review = "grok-4.3"
execution_and_coding = "grok-4.3"
fast_loop = "grok-4.3"
