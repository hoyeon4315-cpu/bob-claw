name: release-automation

on:
  pull_request:
    paths:
      - ".github/workflows/release-automation.yml"
      - "docs/operations/release-automation.md"
      - "dashboard/README.md"
      - "package.json"
      - "package-lock.json"
      - "scripts/release-dry-run.mjs"
      - "test/release-dry-run.test.mjs"
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-automation.yml"
      - "docs/operations/release-automation.md"
      - "dashboard/README.md"
      - "package.json"
      - "package-lock.json"
      - "scripts/release-dry-run.mjs"
      - "test/release-dry-run.test.mjs"
  workflow_dispatch:
    inputs:
      deploy_dashboard:
        description: "Deploy dashboard to the configured Cloudflare Pages production project"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-automation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-dry-run:
    name: release dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release automation plan
        run: npm run release:dry-run -- --json

      - name: Run release automation unit tests
        run: node --test test/release-dry-run.test.mjs

      - name: Run repository checks
        run: npm run check

      - name: Run test suite
        run: npm test

      - name: Build dashboard artifact
        run: npm run dashboard:build

  dashboard-release:
    name: deploy dashboard release
    needs: release-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main' &&
        inputs.deploy_dashboard == true
      }}
    environment: cloudflare-pages-production
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BOB_CLAW_CF_PAGES_PROJECT: ${{ vars.BOB_CLAW_CF_PAGES_PROJECT || 'bob-claw-dashboard' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release automation plan
        run: npm run release:dry-run -- --json

      - name: Check deployment secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$BOB_CLAW_CF_PAGES_PROJECT"

      - name: Refresh dashboard publish slices for verification
        run: |
          npm run status:dashboard:light -- --commit-public
          node src/cli/report-strategy-tick-slice.mjs --json --quiet --commit-public
          npm run verify:dashboard-publish

      - name: Deploy dashboard through repository deploy script
        run: npm run deploy:dashboard:cloudflare

      - name: Verify local publish slices after deploy script
        run: npm run verify:dashboard-publish

      - name: Verify deployed dashboard status is reachable
        run: |
          DASHBOARD_STATUS_URL="https://${BOB_CLAW_CF_PAGES_PROJECT}.pages.dev/dashboard-status.json"
          curl --fail --silent --show-error --retry 5 --retry-delay 5 "$DASHBOARD_STATUS_URL" > /tmp/dashboard-status.json
          node -e 'const fs=require("node:fs"); const payload=JSON.parse(fs.readFileSync("/tmp/dashboard-status.json","utf8")); if (!payload.generatedAt) throw new Error("remote dashboard-status.json missing generatedAt"); console.log(`remote generatedAt=${payload.generatedAt}`);'
