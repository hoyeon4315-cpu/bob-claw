name: generated-docs-check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/generated-docs-check.yml"
      - "AGENTS.md"
      - "docs/README.md"
      - "docs/reference/agent-automation-reference.generated.md"
      - "package-lock.json"
      - "package.json"
      - "scripts/generate-agent-reference-docs.mjs"
      - "src/**"
      - "test/agent-reference-docs-generator.test.mjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Verify docs generator tests
        run: node --test test/agent-reference-docs-generator.test.mjs

      - name: Verify generated docs are current
        run: npm run docs:check
