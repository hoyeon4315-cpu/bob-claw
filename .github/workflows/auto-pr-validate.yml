name: auto-pr-validate

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "AGENTS.md"
      - ".gitignore"
      - ".secrets.baseline"
      - ".github/workflows/auto-pr-validate.yml"
      - ".github/workflows/deploy-dashboard-cloudflare.yml"
      - "package.json"
      - "package-lock.json"
      - "docs/**"
      - "docs/operations/dashboard-deploy-automation.md"
      - "docs/readiness/dead-code-baseline.json"
      - "docs/readiness/dead-feature-flags.md"
      - "docs/structured-logging.md"
      - "docs/trace-context.md"
      - "docs/readiness/metrics-collection.md"
      - "docs/readiness/profiling-instrumentation.md"
      - "docs/readiness/tech-debt-baseline.json"
      - "docs/readiness/duplicate-code-baseline.json"
      - "docs/readiness/duplicate-code.md"
      - ".jscpd.json"
      - ".dependency-cruiser.cjs"
      - "knip.config.js"
      - "src/config/**"
      - "src/strategy/**"
      - "src/risk/**"
      - "src/executor/**"
      - "src/logger.mjs"
      - "src/cli/check-structured-logger.mjs"
      - "src/trace-context.mjs"
      - "src/cli/check-trace-context.mjs"
      - "src/metrics/registry.mjs"
      - "src/cli/report-metrics-snapshot.mjs"
      - "scripts/profile-*.mjs"
      - "scripts/run-profile-target.mjs"
      - "scripts/profile-targets.mjs"
      - "scripts/**"
      - "test/**"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: node scripts/track-build-performance.mjs --label=npm-ci --artifact-dir=artifacts/build-performance -- npm ci
      - run: npm run check:agents-freshness
      - run: npm run perf:check:dead-code
      - run: npm run perf:check:dead-feature-flags
      - run: npm run perf:check:structured-logger
      - run: npm run perf:check:trace-context
      - run: npm run perf:check:metrics-collection
      - run: npm run perf:check:tech-debt
      - run: npm run perf:check:agents-freshness
      - run: npm run perf:check:large-files
      - run: npm run perf:check:duplicate-code
      - run: npm run check:unused-dependencies
      - run: npm run perf:check:architecture
      - run: npm run perf:test
      - run: npm run perf:dashboard:build
      - run: npm run perf:profile:smoke
      - name: dryrun opportunity candidate
        run: npm run dryrun:opportunity-candidate -- --id=placeholder || true
      - name: audit evidence
        run: npm run audit:evidence -- --max-age-hours=24 || true
      - name: publish build performance summary
        if: always()
        run: |
          if [ -f artifacts/build-performance/summary.md ]; then
            cat artifacts/build-performance/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/build-performance/test-performance-summary.md ]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/build-performance/test-performance-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: upload build performance artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-performance-tracking
          path: artifacts/build-performance
          if-no-files-found: error
      - name: label auto-merge-eligible on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['auto-merge-eligible']
            });

  secret_scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python3 -m pip install detect-secrets==1.5.0
      - run: npm run check:secret-scanning

  coverage_thresholds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:coverage
