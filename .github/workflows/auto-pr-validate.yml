name: auto-pr-validate

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - ".github/workflows/auto-pr-validate.yml"
      - ".dependency-cruiser.cjs"
      - ".jscpd.json"
      - "dashboard/public/*.jsx"
      - "docs/**"
      - "docs/readiness/dead-code-baseline.json"
      - "docs/readiness/tech-debt-baseline.json"
      - "docs/readiness/duplicate-code-baseline.json"
      - "knip.config.js"
      - "package-lock.json"
      - "package.json"
      - "research/**"
      - "src/cli/**"
      - "src/config/**"
      - "src/executor/**"
      - "src/risk/**"
      - "src/strategy/**"
      - "test/**"
      - "test/check-duplicate-code.test.mjs"
      - "test/check-dead-code.test.mjs"
      - "test/check-tech-debt.test.mjs"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: node scripts/track-build-performance.mjs --label=npm-ci --artifact-dir=artifacts/build-performance -- npm ci
      - run: npm run perf:check:dead-code
      - run: npm run perf:check:tech-debt
      - run: npm run perf:check:duplicate-code
      - run: npm run perf:check:architecture
      - run: npm run perf:test
      - run: npm run perf:dashboard:build
      - name: dryrun opportunity candidate
        run: npm run dryrun:opportunity-candidate -- --id=placeholder || true
      - name: audit evidence
        run: npm run audit:evidence -- --max-age-hours=24 || true
      - name: publish build performance summary
        if: always()
        run: |
          if [ -f artifacts/build-performance/summary.md ]; then
            cat artifacts/build-performance/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f artifacts/build-performance/test-performance-summary.md ]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/build-performance/test-performance-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: upload build performance artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-performance-tracking
          path: artifacts/build-performance
          if-no-files-found: error
      - name: label auto-merge-eligible on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['auto-merge-eligible']
            });
