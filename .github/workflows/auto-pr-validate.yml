name: auto-pr-validate

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - ".github/workflows/auto-pr-validate.yml"
      - "dashboard/public/*.jsx"
      - "docs/readiness/dead-code-baseline.json"
      - "knip.config.js"
      - "package-lock.json"
      - "package.json"
      - "research/**"
      - "src/cli/**"
      - "src/config/**"
      - "src/executor/**"
      - "src/risk/**"
      - "src/strategy/**"
      - "test/check-dead-code.test.mjs"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run check:dead-code
      - run: npm run test
      - name: dryrun opportunity candidate
        run: npm run dryrun:opportunity-candidate -- --id=placeholder || true
      - name: audit evidence
        run: npm run audit:evidence -- --max-age-hours=24 || true
      - name: label auto-merge-eligible on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['auto-merge-eligible']
            });
