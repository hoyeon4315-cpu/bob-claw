<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>BOB Claw</title>
  <link rel="icon" href="./favicon.ico"/>
  <style>
    :root {
      --ink: #111113;
      --ink-2: #3A3A3D;
      --ink-3: #6B6B6E;
      --ink-4: #A0A0A3;
      --line: #E4E4E6;
      --paper: #F5F5F6;
      --card: #FFFFFF;
      --accent: #F2A33B;
      --green: #1C7A3E;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    html, body { margin: 0; padding: 0; background: var(--paper); font-family: -apple-system, "SF Pro", system-ui, sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
    .stage { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 0; box-sizing: border-box; }
    .title { font-size: 13px; color: var(--ink-3); letter-spacing: 2px; text-transform: uppercase; margin: 0; text-align: center; }
    .sub { font-size: 12px; color: var(--ink-4); margin-top: 4px; letter-spacing: 0.2px; text-align: center; }

    .tabtrack {
      flex: 1 1 auto; min-height: 0;
      display: flex; width: 100%;
      overflow-x: auto; overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
    }
    .tabtrack::-webkit-scrollbar { display: none; }
    .tabpane {
      flex: 0 0 100%; width: 100%; height: 100%;
      scroll-snap-align: start;
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      box-sizing: border-box;
    }
    .tabpane::-webkit-scrollbar { display: none; }
    .tabbar {
      display: flex; gap: 4px; padding: 6px;
      background: #ECECEE; border-radius: 12px;
      margin: 0 16px 12px;
    }
    .tabbar button {
      flex: 1; border: none; background: transparent;
      font: 500 13px/1.2 -apple-system, system-ui; letter-spacing: -0.1px;
      color: var(--ink-3);
      padding: 8px 0; border-radius: 8px; cursor: pointer;
      transition: background 280ms var(--ease), color 280ms var(--ease);
    }
    .tabbar button[aria-selected="true"] { background: #fff; color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

    .boot { color: var(--ink-4); font-size: 12px; letter-spacing: 0.4px; }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes cardIn { from { transform: translateY(14px); opacity: 0 } to { transform: none; opacity: 1 } }
    @keyframes chipIn { from { transform: scale(0.6); opacity: 0 } to { transform: scale(1); opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(8px); opacity: 0 } to { transform: none; opacity: 1 } }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root" class="stage"><div class="boot">loading live status…</div></div>

  <script src="./logos.js?v=20260503-mindmap-route-logos-v4"></script>
  <script src="./data.js?v=20260503-mindmap-route-logos-v4"></script>
  <script src="./ios-frame.js?v=20260503-mindmap-route-logos-v4"></script>
  <script src="./mindmap.js?v=20260503-mindmap-route-logos-v4"></script>
  <script src="./app.js?v=20260503-mindmap-route-logos-v4"></script>
</body>
</html>
